name: Firecrawl Python

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      FIRECRAWL_API: ${{ secrets.FIRECRAWL_API }}
      OPENROUTER_API: ${{ secrets.OPENROUTER_API }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: |
          pip install -r requirements.txt

      - name: Run Python
        run: |
          python main.py

      - name: Commit JSON files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add *.json

          git commit -m "update currency data" || echo "No changes"

          git push
